services:
  ext-authz:
    build: .
    ports:
      - "10001:10001"
    restart: on-failure

  envoy:
    image: envoyproxy/envoy:v1.32-latest
    volumes:
      - ./config/envoy.yaml:/etc/envoy/envoy.yaml
    ports:
      - "8080:8080"
      - "9901:9901"
    command: ["/usr/local/bin/envoy", "-c", "/etc/envoy/envoy.yaml"]
    depends_on:
      - ext-authz
