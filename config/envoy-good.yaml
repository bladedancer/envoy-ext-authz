static_resources:
  listeners:
  - name: listener_0
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8080
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          http_filters:

          # 1. JWT authentication — parses tokens and stores claims in dynamic metadata.
          #    allow_missing_or_failed means Envoy never rejects here; ext_authz enforces.
          - name: envoy.filters.http.jwt_authn
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
              providers:
                provider_okta_1:
                  issuer: "https://integrator-1045327.okta.com/oauth2/default"
                  remote_jwks:
                    http_uri:
                      uri: "https://integrator-1045327.okta.com/oauth2/default/v1/keys"
                      cluster: okta_jwks
                      timeout: 5s
                    cache_duration: 300s
                  payload_in_metadata: provider_okta_1
                  forward: true
              rules:
              - match:
                  prefix: /api/foo
                requires:
                  requires_any:
                    requirements:
                    - provider_name: provider_okta_1
                    - allow_missing_or_failed: {}

          # 2. External authorization — forwards jwt_authn metadata to the Go service.
          - name: envoy.filters.http.ext_authz
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
              grpc_service:
                envoy_grpc:
                  cluster_name: ext_authz
              transport_api_version: V3
              # Forward the jwt_authn dynamic metadata namespace to CheckRequest.
              metadata_context_namespaces:
              - envoy.filters.http.jwt_authn

          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

          route_config:
            name: local_route
            virtual_hosts:
            - name: local_service
              domains: ["*"]
              routes:
              - match:
                  prefix: /api/foo
                route:
                  cluster: httpbin
                  prefix_rewrite: /

  clusters:
  # gRPC ext_authz service (this project)
  - name: ext_authz
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: ext_authz
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: ext-authz
                port_value: 10001

  # Upstream — httpbin.org over TLS
  - name: httpbin
    type: LOGICAL_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: httpbin
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: httpbin.org
                port_value: 443
    transport_socket:
      name: envoy.transport_sockets.tls
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
        sni: httpbin.org

  # Okta JWKS endpoint — used by jwt_authn to fetch public keys
  - name: okta_jwks
    type: LOGICAL_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: okta_jwks
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: integrator-1045327.okta.com
                port_value: 443
    transport_socket:
      name: envoy.transport_sockets.tls
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
        sni: integrator-1045327.okta.com

admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901
